<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ฐานข้อมูลภูมิปัญญาท้องถิ่นไทย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111317;
  --surface:#1a1c20;
  --surface-mid:#1e2024;
  --surface-high:#282a2e;
  --surface-top:#333539;
  --cyan:#00f0ff;
  --cyan-dim:#00dbe9;
  --cyan-light:#dbfcff;
  --lime:#2ff801;
  --lime-text:#d7ffc5;
  --text:#e2e2e8;
  --text-dim:#b9cacb;
  --text-muted:#6b7a7b;
  --error:#ffb4ab;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px}
.font-head{font-family:'Space Grotesk',sans-serif}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface-top);border-radius:2px}

/* ── Layout ── */
.layout{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:240px;flex-shrink:0;background:var(--surface);
  display:flex;flex-direction:column;padding:24px 0;
  border-right:0;position:relative;z-index:10;
}
.sidebar-logo{padding:0 20px 24px;border-bottom:1px solid rgba(59,73,75,.3)}
.sidebar-logo h1{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan)}
.sidebar-logo p{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:10px;font-family:'Space Grotesk',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 20px;
  color:var(--text-dim);cursor:pointer;transition:all .15s;
  font-size:13px;font-family:'Space Grotesk',sans-serif;
  border-left:2px solid transparent;
  user-select:none;
}
.nav-item:hover{background:rgba(40,42,46,.6);color:var(--cyan-light)}
.nav-item.active{background:rgba(0,240,255,.06);color:var(--cyan);border-left-color:var(--cyan)}
.nav-icon{font-size:16px;width:18px;text-align:center}

.sidebar-stats{padding:16px 20px;border-top:1px solid rgba(59,73,75,.3)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.stat-label{font-size:10px;color:var(--text-muted);font-family:'Space Grotesk',sans-serif;letter-spacing:.08em;text-transform:uppercase}
.stat-val{font-size:13px;font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--cyan)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.topbar{
  background:var(--surface-mid);padding:12px 24px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  border-bottom:1px solid rgba(59,73,75,.2);
}
.page-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text-dim);letter-spacing:.05em;text-transform:uppercase;min-width:120px}
.search-wrap{flex:1;position:relative;max-width:400px}
.search-wrap input{
  width:100%;background:var(--surface-top);border:none;border-radius:3px;
  padding:7px 12px 7px 32px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:box-shadow .15s;
}
.search-wrap input:focus{box-shadow:0 0 0 1px rgba(0,240,255,.3)}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{
  padding:4px 10px;border-radius:2px;font-size:11px;font-family:'Space Grotesk',sans-serif;
  font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;
  background:var(--surface-top);color:var(--text-muted);border:none;
}
.chip:hover{color:var(--cyan-light);background:rgba(0,240,255,.08)}
.chip.active{background:rgba(0,240,255,.12);color:var(--cyan)}

/* ── Filter row ── */
.filterbar{
  background:var(--surface);padding:8px 24px;display:flex;gap:10px;align-items:center;
  flex-shrink:0;border-bottom:1px solid rgba(59,73,75,.15);
}
.filter-select{
  background:var(--surface-high);border:none;border-radius:2px;
  padding:5px 10px;color:var(--text-dim);font-size:12px;font-family:'Space Grotesk',sans-serif;
  cursor:pointer;outline:none;
}
.filter-select:focus{box-shadow:0 0 0 1px rgba(0,240,255,.3)}
.filter-label{font-size:10px;color:var(--text-muted);font-family:'Space Grotesk',sans-serif;letter-spacing:.08em;text-transform:uppercase}
.clear-btn{
  padding:5px 12px;background:transparent;border:1px solid rgba(59,73,75,.5);
  border-radius:2px;color:var(--text-muted);font-size:11px;font-family:'Space Grotesk',sans-serif;
  cursor:pointer;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;
}
.clear-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.result-count{margin-left:auto;font-size:11px;font-family:'Space Grotesk',sans-serif;color:var(--text-muted)}
.result-count span{color:var(--cyan);font-weight:600}

/* ── Content area ── */
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* ── Article grid ── */
.article-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}

/* ── Card ── */
.card{
  background:var(--surface-mid);border-radius:3px;overflow:hidden;
  cursor:pointer;transition:all .18s;display:flex;flex-direction:column;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.card:hover{background:var(--surface-high);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card-img{
  height:150px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
}
.card-img.has-photo{background-size:cover!important;background-position:center!important}
.card-img-emoji{font-size:3rem;opacity:.8;position:relative;z-index:1}
.card-accent{position:absolute;top:0;left:0;right:0;height:2px}
.card-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.card-source{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'Space Grotesk',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
.src-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-excerpt{font-size:11px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px}
.cat-pill{
  padding:2px 7px;border-radius:2px;font-size:10px;font-family:'Space Grotesk',sans-serif;
  font-weight:500;letter-spacing:.05em;text-transform:uppercase;
}
.cat-food{background:rgba(249,115,22,.15);color:#fb923c}
.cat-tradition{background:rgba(168,85,247,.15);color:#c084fc}
.cat-arts{background:rgba(6,182,212,.15);color:#22d3ee}
.cat-wisdom{background:rgba(16,185,129,.15);color:#34d399}
.cat-place{background:rgba(217,119,6,.15);color:#fbbf24}
.cat-nature{background:rgba(34,197,94,.15);color:#4ade80}
.cat-research{background:rgba(59,130,246,.15);color:#60a5fa}
.loc-tag{font-size:10px;font-family:'Space Grotesk',sans-serif;color:var(--text-muted);display:flex;align-items:center;gap:3px}

/* ── Pagination ── */
.pagination{display:flex;gap:4px;justify-content:center;margin-top:20px;padding-bottom:20px}
.page-btn{
  padding:5px 10px;background:var(--surface-high);border:none;border-radius:2px;
  color:var(--text-dim);font-family:'Space Grotesk',sans-serif;font-size:12px;
  cursor:pointer;transition:all .15s;min-width:32px;
}
.page-btn:hover{background:var(--surface-top);color:var(--cyan-light)}
.page-btn.active{background:rgba(0,240,255,.15);color:var(--cyan)}
.page-btn:disabled{opacity:.3;cursor:default}
.page-dots{padding:5px 4px;color:var(--text-muted);font-family:'Space Grotesk',sans-serif;font-size:12px}

/* ── Empty state ── */
.empty{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty-icon{font-size:3rem;opacity:.3;display:block;margin-bottom:12px}
.empty p{font-family:'Space Grotesk',sans-serif;font-size:13px;letter-spacing:.04em}

/* ── Map ── */
#map-container{height:100%;border-radius:3px;overflow:hidden}
#map{height:100%;width:100%}
.content.map-mode{padding:0;display:flex;flex-direction:column}

/* ── Dashboard ── */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.dash-card{
  background:var(--surface-mid);border-radius:3px;padding:16px 20px;
  display:flex;flex-direction:column;gap:6px;
}
.dash-label{font-size:10px;font-family:'Space Grotesk',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.dash-val{font-size:28px;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--cyan)}
.dash-sub{font-size:11px;color:var(--text-muted)}
.dash-bar{height:2px;background:var(--surface-top);border-radius:1px;margin-top:8px;overflow:hidden}
.dash-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));border-radius:1px}

.region-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:20px}
.region-card{
  background:var(--surface-mid);border-radius:3px;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.region-name{font-size:12px;font-family:'Space Grotesk',sans-serif;color:var(--text-dim)}
.region-count{font-size:16px;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--lime)}

.site-table{background:var(--surface-mid);border-radius:3px;overflow:hidden}
.site-table table{width:100%;border-collapse:collapse}
.site-table th{
  padding:8px 14px;text-align:left;font-size:10px;font-family:'Space Grotesk',sans-serif;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);
  background:var(--surface-high);
}
.site-table td{padding:10px 14px;font-size:12px;border-top:1px solid rgba(59,73,75,.15)}
.site-table tr:hover td{background:rgba(40,42,46,.5)}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}
.status-ok{background:var(--lime);box-shadow:0 0 6px rgba(47,248,1,.4)}
.status-off{background:var(--text-muted)}

.section-title{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(59,73,75,.3)}

/* ── Visitor stats ── */
.visitor-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}

/* ── Ping animation ── */
@keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}
.live-dot{position:relative;display:inline-block;width:8px;height:8px}
.live-dot::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--lime);animation:ping 2s infinite}
.live-dot::after{content:'';position:absolute;inset:1px;border-radius:50%;background:var(--lime)}

/* ── Cyan glow ── */
.cyan-glow{box-shadow:0 20px 40px rgba(0,240,255,.08)}

/* ── Map popup ── */
.leaflet-popup-content-wrapper{background:var(--surface-high);color:var(--text);border:none;border-radius:3px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.leaflet-popup-tip{background:var(--surface-high)}
.map-popup h4{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--cyan);margin-bottom:4px}
.map-popup p{font-size:11px;color:var(--text-dim)}
.map-popup a{color:var(--cyan-light);font-size:11px}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{width:56px}
  .sidebar-logo p,.nav-item span:not(.nav-icon),.sidebar-stats .stat-label,.sidebar-stats .stat-val{display:none}
  .sidebar-logo h1{font-size:10px}
  .main{overflow:auto}
  .topbar{flex-wrap:wrap;gap:8px}
  .filter-chips{display:none}
  .article-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.article-grid{grid-template-columns:1fr}}
</style>
</head>

<aside class="sidebar">

    <div class="stat-row">
      <span class="stat-label">สถานที่</span>
      <span class="stat-val" id="sb-pins">—</span>

  </div>
</aside>

<!-- ── Main ── -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">

    <div class="filter-chips" id="cat-chips"></div>

  <!-- Filter bar -->
  <div class="filterbar" id="filterbar">
    <span class="filter-label">ภูมิภาค</span>
    <select class="filter-select" id="region-select" onchange="onRegionChange()">
      <option value="">— ทั้งหมด —</option>
      <option value="ภาคเหนือ">ภาคเหนือ</option>
      <option value="ภาคอีสาน">ภาคอีสาน</option>
      <option value="ภาคกลาง">ภาคกลาง</option>
      <option value="ภาคตะวันออก">ภาคตะวันออก</option>
      <option value="ภาคตะวันตก">ภาคตะวันตก</option>
      <option value="ภาคใต้">ภาคใต้</option>
    </select>
    <span class="filter-label">แหล่งข้อมูล</span>
    <select class="filter-select" id="source-select" onchange="onSourceChange()">
      <option value="">— ทั้งหมด —</option>
    </select>
    <button class="clear-btn" onclick="clearFilters()">✕ ล้างตัวกรอง</button>
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- Articles view -->
  <div class="content" id="view-articles">
    <div class="article-grid" id="article-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Map view -->
  <div class="content map-mode" id="view-map" style="display:none">
    <div id="map-container"><div id="map"></div></div>
  </div>

  <!-- Dashboard view -->
  <div class="content" id="view-dashboard" style="display:none">
    <div class="section-title">สถิติภาพรวม</div>
    <div class="dashboard-grid" id="dash-overview"></div>
    <div class="section-title">บทความตามภูมิภาค</div>
    <div class="region-grid" id="dash-regions"></div>
    <div class="section-title">แหล่งข้อมูลทั้งหมด</div>
    <div class="site-table"><table>
      <thead><tr>
        <th>แหล่งข้อมูล</th><th>ภูมิภาค</th><th>จังหวัด</th><th>บทความ</th><th>สถานะ</th>
      </tr></thead>
      <tbody id="dash-sites"></tbody>
    </table></div>
  </div>

</div>
</div>

<script>
// ── Data ────────────────────────────────────────────────────────
const SITES  = JSON.parse(document.getElementById('SITES_CONFIG').textContent);
const ARTICLES = JSON.parse(document.getElementById('ARTICLES_DATA').textContent);
const SITE_MAP = {};
SITES.forEach(s => SITE_MAP[s.id] = s);

const CAT_LABELS = {
  food:'อาหาร', tradition:'ประเพณี', arts:'ศิลปะ',
  wisdom:'ภูมิปัญญา', place:'สถานที่', nature:'ธรรมชาติ', research:'วิจัย'
};
const CAT_BG = {
  food:      'linear-gradient(135deg,#f97316,#ef4444)',
  tradition: 'linear-gradient(135deg,#a855f7,#ec4899)',
  arts:      'linear-gradient(135deg,#06b6d4,#6366f1)',
  wisdom:    'linear-gradient(135deg,#10b981,#059669)',
  place:     'linear-gradient(135deg,#d97706,#92400e)',
  nature:    'linear-gradient(135deg,#22c55e,#15803d)',
  research:  'linear-gradient(135deg,#3b82f6,#1d4ed8)',
};
const CAT_EMOJI = {
  food:'🍲', tradition:'🎎', arts:'🎨', wisdom:'📚',
  place:'🏛️', nature:'🌿', research:'📖'
};

// ── State ───────────────────────────────────────────────────────
let curView = 'articles';
let activeCat = '', activeSrc = '', activeRegion = '', searchQ = '';
let curPage = 1;
const PER_PAGE = 16;
let mapObj = null, mapInited = false;

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const pins = ARTICLES.filter(a => a.pin && a.lat && a.lng).length;
  document.getElementById('sb-arts').textContent = ARTICLES.length;
  document.getElementById('sb-pins').textContent = pins;
  buildCatChips();
  populateSourceDropdown();
  renderArticles();
  buildDashboard();
  // visitor stats
  updateVisitorStats();
});

// ── Category chips ───────────────────────────────────────────────
function buildCatChips() {
  const cats = [...new Set(ARTICLES.map(a => a.cat))];
  const order = ['food','tradition','arts','wisdom','place','nature','research'];
  const sorted = order.filter(c => cats.includes(c));
  const wrap = document.getElementById('cat-chips');
  wrap.innerHTML = `<button class="chip active" onclick="setCat('')">ทั้งหมด</button>` +
    sorted.map(c => `<button class="chip" onclick="setCat('${c}')">${CAT_LABELS[c]||c}</button>`).join('');
}

function setCat(c) {
  activeCat = c; curPage = 1;
  document.querySelectorAll('.chip').forEach(el => {
    const t = el.textContent.trim();
    el.classList.toggle('active', c === '' ? t === 'ทั้งหมด' : t === (CAT_LABELS[c]||c));
  });
  renderArticles();
}

// ── Source dropdown ──────────────────────────────────────────────
function populateSourceDropdown() {
  const sel = document.getElementById('source-select');
  while (sel.options.length > 1) sel.remove(1);
  const REGIONS = ['ภาคเหนือ','ภาคอีสาน','ภาคกลาง','ภาคตะวันออก','ภาคตะวันตก','ภาคใต้'];
  const byRegion = {};
  SITES.forEach(s => { if (!byRegion[s.region]) byRegion[s.region] = []; byRegion[s.region].push(s); });
  REGIONS.forEach(r => {
    if (activeRegion && r !== activeRegion) return;
    const grp = byRegion[r]; if (!grp) return;
    const og = document.createElement('optgroup'); og.label = r;
    grp.forEach(s => {
      const cnt = ARTICLES.filter(a => a.source === s.id).length;
      const op = document.createElement('option');
      op.value = s.id; op.textContent = `${s.name_th} (${cnt})`;
      og.appendChild(op);
    });
    sel.appendChild(og);
  });
}

// ── Filters ──────────────────────────────────────────────────────
function filtered() {
  return ARTICLES.filter(a => {
    if (activeCat && a.cat !== activeCat) return false;
    if (activeSrc && a.source !== activeSrc) return false;
    if (activeRegion) { const s = SITE_MAP[a.source]; if (!s || s.region !== activeRegion) return false; }
    if (searchQ && !a.title.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
}
function onSearch() { searchQ = document.getElementById('search-input').value; curPage = 1; renderArticles(); }
function onRegionChange() {
  activeRegion = document.getElementById('region-select').value;
  activeSrc = ''; curPage = 1;
  populateSourceDropdown();
  renderArticles();
}
function onSourceChange() { activeSrc = document.getElementById('source-select').value; curPage = 1; renderArticles(); }
function clearFilters() {
  activeCat = ''; activeSrc = ''; activeRegion = ''; searchQ = ''; curPage = 1;
  document.getElementById('search-input').value = '';
  document.getElementById('region-select').value = '';
  document.getElementById('source-select').value = '';
  document.querySelectorAll('.chip').forEach((el,i) => el.classList.toggle('active', i===0));
  populateSourceDropdown();
  renderArticles();
}

// ── Render articles ───────────────────────────────────────────────
function renderArticles() {
  const arts = filtered();
  const total = arts.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  curPage = Math.min(curPage, pages);
  const slice = arts.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);

  document.getElementById('result-count').innerHTML = `<span>${total}</span> บทความ`;

  const grid = document.getElementById('article-grid');
  if (!slice.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><span class="empty-icon">🔍</span><p>ไม่พบบทความที่ตรงกัน</p></div>';
  } else {
    grid.innerHTML = slice.map(a => {
      const s = SITE_MAP[a.source] || {};
      const color = s.color || '#00dbe9';
      const proxyImg = a.image ? `https://wsrv.nl/?url=${encodeURIComponent(a.image)}&w=400&output=jpg&q=80` : null;
      const imgStyle = proxyImg
        ? `background-image:url('${proxyImg}');background-size:cover;background-position:center`
        : `background:${CAT_BG[a.cat]||'linear-gradient(135deg,#1e2024,#282a2e)'}`;
      const emoji = proxyImg ? '' : `<span class="card-img-emoji">${CAT_EMOJI[a.cat]||'📄'}</span>`;
      const pin = a.lat ? `<span class="loc-tag">📍 ${(a.lat).toFixed(1)}°N</span>` : '';
      return `<div class="card" onclick="window.open('${a.url}','_blank')">
        <div class="card-img ${proxyImg?'has-photo':''}" style="${imgStyle}">
          ${emoji}
          <div class="card-accent" style="background:${color}"></div>
        </div>
        <div class="card-body">
          <div class="card-source">
            <span class="src-dot" style="background:${color}"></span>
            ${s.name_th||a.source}
          </div>
          <div class="card-title">${a.title}</div>
          <div class="card-excerpt">${a.excerpt||''}</div>
          <div class="card-footer">
            <span class="cat-pill cat-${a.cat}">${CAT_LABELS[a.cat]||a.cat}</span>
            ${pin}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  renderPagination(pages);
}

// ── Pagination ────────────────────────────────────────────────────
function renderPagination(pages) {
  const wrap = document.getElementById('pagination');
  if (pages <= 1) { wrap.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
  const show = new Set([1, pages, curPage, curPage-1, curPage+1].filter(p => p>=1 && p<=pages));
  let prev = 0;
  [...show].sort((a,b)=>a-b).forEach(p => {
    if (prev && p - prev > 1) html += `<span class="page-dots">…</span>`;
    html += `<button class="page-btn ${p===curPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===pages?'disabled':''}>›</button>`;
  wrap.innerHTML = html;
}
function goPage(p) { curPage = p; renderArticles(); document.getElementById('view-articles').scrollTop = 0; }

// ── View switching ────────────────────────────────────────────────
function setView(v) {
  curView = v;
  ['articles','map','dashboard'].forEach(n => {
    document.getElementById(`view-${n}`).style.display = n===v ? (n==='map'?'flex':'block') : 'none';
    document.getElementById(`nav-${n}`).classList.toggle('active', n===v);
  });
  const titles = {articles:'บทความทั้งหมด', map:'แผนที่สถานที่', dashboard:'แดชบอร์ด'};
  document.getElementById('page-title').textContent = titles[v];
  document.getElementById('filterbar').style.display = v==='articles' ? 'flex' : 'none';
  if (v==='map' && !mapInited) initMap();
}

// ── Map ───────────────────────────────────────────────────────────
function initMap() {
  mapInited = true;
  mapObj = L.map('map', {zoomControl:true}).setView([13.7, 100.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', maxZoom:19
  }).addTo(mapObj);
  const pinArts = ARTICLES.filter(a => a.pin && a.lat && a.lng);
  const catColor = {food:'#f97316',tradition:'#a855f7',arts:'#06b6d4',wisdom:'#10b981',place:'#d97706',nature:'#22c55e',research:'#3b82f6'};
  pinArts.forEach(a => {
    const s = SITE_MAP[a.source] || {};
    const col = catColor[a.cat] || '#00f0ff';
    const icon = L.divIcon({
      html:`<div style="width:10px;height:10px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,.3);box-shadow:0 0 8px ${col}88"></div>`,
      className:'',iconSize:[10,10],iconAnchor:[5,5]
    });
    L.marker([a.lat, a.lng], {icon}).addTo(mapObj)
      .bindPopup(`<div class="map-popup"><h4>${a.title.substring(0,60)}</h4><p>${s.name_th||''}</p><a href="${a.url}" target="_blank">เปิดบทความ →</a></div>`);
  });
}

// ── Dashboard ─────────────────────────────────────────────────────
function buildDashboard() {
  const pins = ARTICLES.filter(a=>a.pin&&a.lat&&a.lng).length;
  const withImg = ARTICLES.filter(a=>a.image).length;
  const pct = Math.round(withImg/ARTICLES.length*100);
  document.getElementById('dash-overview').innerHTML = [
    {label:'บทความทั้งหมด', val:ARTICLES.length, sub:'จากทุกแหล่ง', pct:100},
    {label:'แหล่งข้อมูล', val:SITES.length, sub:'มหาวิทยาลัย/หน่วยงาน', pct:100},
    {label:'สถานที่ปักหมุด', val:pins, sub:`จาก ${ARTICLES.length} บทความ`, pct:Math.round(pins/ARTICLES.length*100)},
    {label:'บทความมีรูป', val:withImg, sub:`${pct}% ของทั้งหมด`, pct},
  ].map(d=>`<div class="dash-card">
    <div class="dash-label">${d.label}</div>
    <div class="dash-val">${d.val}</div>
    <div class="dash-sub">${d.sub}</div>
    <div class="dash-bar"><div class="dash-bar-fill" style="width:${d.pct}%"></div></div>
  </div>`).join('');

  const REGIONS = ['ภาคเหนือ','ภาคอีสาน','ภาคกลาง','ภาคตะวันออก','ภาคตะวันตก','ภาคใต้'];
  document.getElementById('dash-regions').innerHTML = REGIONS.map(r => {
    const cnt = ARTICLES.filter(a=>{ const s=SITE_MAP[a.source]; return s&&s.region===r; }).length;
    return `<div class="region-card"><span class="region-name">${r}</span><span class="region-count">${cnt}</span></div>`;
  }).join('');

  document.getElementById('dash-sites').innerHTML = SITES.map(s => {
    const cnt = ARTICLES.filter(a=>a.source===s.id).length;
    return `<tr>
      <td><span class="status-dot status-ok"></span>${s.name_th}</td>
      <td style="color:var(--text-muted)">${s.region}</td>
      <td style="color:var(--text-muted)">${s.province||'—'}</td>
      <td style="font-family:'Space Grotesk',sans-serif;color:var(--cyan)">${cnt}</td>
      <td><span class="status-dot ${cnt>0?'status-ok':'status-off'}"></span>${cnt>0?'<span style="color:var(--lime);font-size:11px">ACTIVE</span>':'<span style="color:var(--text-muted);font-size:11px">NO DATA</span>'}</td>
    </tr>`;
  }).join('');
}

// ── Visitor stats ─────────────────────────────────────────────────
function updateVisitorStats() {
  try {
    const today = new Date().toISOString().slice(0,10);
    let vs = JSON.parse(localStorage.getItem('lkh_visits')||'{}');
    if (!vs.total) vs = {total:0, today:'', daily:0, sessions:0};
    vs.sessions = (vs.sessions||0) + 1;
    vs.total = (vs.total||0) + 1;
    if (vs.today !== today) { vs.today = today; vs.daily = 1; } else { vs.daily++; }
    localStorage.setItem('lkh_visits', JSON.stringify(vs));
  } catch(e) {}
}
</script>
